syntax = "proto3";

option go_package = "github.com/DataDog/agent-payload/v5/contlcycle";

package datadog.contlcycle;

// EventsPayload represents the main container lifecycle event payload
message EventsPayload {
    string version = 1; // version represents the EventsPayload message version
    string host = 2; // host contains the hostname
    ObjectKind objectKind = 3; // objectKind represents the object kind (container, pod)
    repeated Event events = 4; // events contains all the event details
    string clusterId = 5;
}

// Event contains the details about a container lifecycle event
message Event {
    enum EventType {
        Delete = 0;
        ConditionUpdate = 1; // ConditionUpdate represents a condition update event; inspect the typedEvent for condition data
    }
    EventType eventType = 1; // eventType represents the event's type
    oneof typedEvent {
        ContainerEvent container = 2;
        PodEvent pod = 3;
        TaskEvent task = 4;
    }
}

// ContainerEvent contains container event metadata
message ContainerEvent {
    string containerID = 1; // containerID contains the container ID
    string source = 2; // source contains the container source (docker, containerd..)
    oneof optionalExitCode {
        int32 exitCode = 3;  // exitCode contains the exit code of the container
    }
    oneof optionalExitTimestamp {
        int64 exitTimestamp = 4; // exitTimestamp contains the exit timestamp of the container
    }

    // Owner contains information about what a container belongs to
    message Owner {
        ObjectKind ownerType = 1; // ownerType represents the owner type (pod, etc)
        string ownerUID = 2; // ownerUID contains the owner UID
    }
    optional Owner owner = 5; // owner contains the information about who this container belongs to
}

// PodEvent contains pod event metadata
message PodEvent {
    string podUID = 1; // podUID contains the pod UID
    string source = 2; // source contains the pod source (kubelet)
    optional int64 exitTimestamp = 3; // exitTimestamp contains the exit timestamp of the pod; populated when eventType == Delete
    optional PodConditionUpdate conditionUpdate = 4; // conditionUpdate contains condition update data; populated when eventType == ConditionUpdate
}

// TaskEvent contains task event metadata
message TaskEvent {
    string taskARN = 1; // taskARN contains the task ARN
    string source = 2; // source contains the task source
    optional int64 exitTimestamp = 3; // exitTimestamp contains the exit timestamp of the task
}

enum ObjectKind {
    Container = 0;
    Pod = 1;
    Task = 2;
}

// PodConditionUpdate contains pod condition update event data.
message PodConditionUpdate {
    optional PodCondition priorCondition = 1; // priorCondition contains the prior condition; absent if this is the first observation
    PodCondition newCondition = 2;            // newCondition contains the new condition
}

// PodCondition represents the state of a pod condition.
// Reference: https://github.com/kubernetes/api/blob/9c98ac1a4c3ffe027f07c16908bf50b80574ae94/core/v1/generated.proto#L3936
message PodCondition {
    optional string type = 1;              // type is the type of the condition
    optional string status = 2;            // status is the status of the condition (True, False, Unknown)
    optional int64 lastProbeTime = 3;      // lastProbeTime is the last time we probed the condition (Unix ms)
    optional int64 lastTransitionTime = 4; // lastTransitionTime is the last time the condition transitioned (Unix ms)
    optional string reason = 5;            // reason is a CamelCase word for the condition's last transition
    optional string message = 6;           // message is a human-readable description of the last transition
    optional int64 observedGeneration = 7; // observedGeneration is the .metadata.generation this condition was set based upon
}
